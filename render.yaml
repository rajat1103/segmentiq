services:
  - type: web
    name: segmentiq-backend
    runtime: python
    rootDirectory: backend/crm_api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
        value: redis://localhost:6379/0
      - key: ALLOWED_ORIGINS
        sync: false
