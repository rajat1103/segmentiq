services:
  - type: web
    name: segmentiq-backend
    runtime: python
    rootDirectory: backend/crm_api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://segmentiq.netlify.app"
